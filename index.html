<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lencería Keren · Tienda Mayorista</title>
<meta name="description" content="Tienda mayorista de Lencería Keren — pedidos por WhatsApp, lista de precios y catálogos">
<meta property="og:title" content="Lencería Keren · Tienda Mayorista">
<meta property="og:description" content="Armá tu pedido mayorista y envialo por WhatsApp">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --marfil:#FBF5F6;
    --papel:#FFFFFF;
    --tinta:#241820;
    --gris:#8C7680;
    --ciruela:#E74275;
    --ciruela-suave:#FCE5EC;
    --blush:#F6BBD1;
    --linea:#F0DEE4;
    --radio:10px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{
    font-family:'Inter',-apple-system,sans-serif;
    background:var(--marfil);
    color:var(--tinta);
    font-size:15px;
    line-height:1.4;
  }

  /* ============ HEADER ============ */
  header{
    background:var(--papel);
    border-bottom:1px solid var(--linea);
    padding:20px 16px 0;
    position:fixed; top:0; left:0; right:0; z-index:20;
    transition:padding .25s ease;
  }
  header.compact{padding-top:10px}
  .brand, .localinfo, #controls{
    max-height:1000px; overflow:hidden;
    transition:max-height .25s ease, opacity .2s ease, margin .25s ease;
  }
  header.compact .brand,
  header.compact .localinfo,
  header.compact #controls{
    max-height:0; opacity:0; margin-top:0; margin-bottom:0;
  }
  .brand{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px; max-width:760px; margin:0 auto;
  }
  .brand h1{
    font-family:'Fraunces',serif;
    font-weight:700; font-size:1.6rem; letter-spacing:.01em;
  }
  .brand h1 em{font-style:normal; color:var(--ciruela)}
  .brand-right{display:flex; align-items:center; gap:9px}
  .social{display:flex; gap:9px}
  .social a{
    display:flex; align-items:center; justify-content:center;
    width:36px; height:36px; border-radius:50%;
    border:none; color:#fff;
    transition:transform .15s, filter .15s;
    flex-shrink:0;
  }
  .social a:hover, .social a:active{transform:scale(1.08); filter:brightness(1.05)}
  .social a svg{width:18px; height:18px}
  .social a.ig{
    background:radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
  }
  .cart-btn{
    position:relative; border:none; cursor:pointer;
    background:var(--ciruela); color:#fff;
    padding:9px 16px; border-radius:100px;
    font-family:'Inter',sans-serif; font-size:.85rem; font-weight:600;
    display:flex; align-items:center; gap:8px;
    transition:filter .15s;
  }
  .cart-btn:hover{filter:brightness(1.06)}
  .cart-count{
    background:#fff; color:var(--ciruela);
    border-radius:100px; font-family:'JetBrains Mono',monospace;
    font-size:.72rem; font-weight:600;
    min-width:20px; height:20px; display:inline-flex; align-items:center; justify-content:center;
    padding:0 5px;
  }
  .localinfo{
    display:flex; align-items:center; justify-content:space-between;
    gap:10px; max-width:760px; margin:8px auto 0;
  }
  .localinfo .tag{
    font-family:'JetBrains Mono',monospace;
    font-size:.62rem; letter-spacing:.14em; text-transform:uppercase;
    color:var(--gris); flex-shrink:0;
  }
  .localinfo .addr{
    font-size:.75rem; color:var(--gris);
    display:flex; align-items:center; gap:5px;
    text-align:right;
  }
  .tabs{
    display:flex; gap:2px;
    max-width:760px; margin:12px auto 0;
    border-bottom:1px solid var(--linea);
  }
  .tab{
    font-family:'Inter',sans-serif; font-size:.85rem; font-weight:600;
    padding:10px 16px; background:none; border:none; cursor:pointer;
    color:var(--gris);
    border-bottom:2.5px solid transparent;
    margin-bottom:-1px;
    transition:color .15s, border-color .15s;
  }
  .tab.active{color:var(--ciruela); border-bottom-color:var(--ciruela)}

  .searchwrap{max-width:760px; margin:14px auto 0}
  .searchbox{
    display:flex; align-items:center; gap:10px;
    background:var(--marfil);
    border:1.5px solid var(--linea);
    border-radius:var(--radio);
    padding:12px 14px;
    transition:border-color .15s;
  }
  .searchbox:focus-within{border-color:var(--ciruela)}
  .searchbox input{
    flex:1; border:none; background:transparent; outline:none;
    font-family:'JetBrains Mono',monospace; font-size:.95rem;
    color:var(--tinta);
  }
  .searchbox input::placeholder{color:var(--gris); font-family:'Inter',sans-serif}
  .chips{
    display:flex; flex-wrap:wrap; gap:8px; max-width:760px; margin:10px auto 0;
    padding-bottom:12px;
  }
  .chip{
    font-family:'Inter',sans-serif; font-size:.74rem; font-weight:500;
    padding:6px 12px; border-radius:100px;
    border:1px solid var(--linea); background:var(--papel);
    color:var(--tinta); cursor:pointer; white-space:nowrap;
    transition:all .12s;
  }
  .chip.active{background:var(--ciruela); border-color:var(--ciruela); color:#fff}

  /* ============ META ============ */
  .meta{
    max-width:760px; margin:0 auto; padding:14px 16px 4px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .meta .count{
    font-family:'JetBrains Mono',monospace; font-size:.7rem;
    letter-spacing:.08em; color:var(--gris); text-transform:uppercase;
  }

  main{max-width:760px; margin:0 auto; padding:6px 16px 30px}

  /* ============ VISTA TIENDA (cards estilo combos) ============ */
  .grid{
    display:grid; gap:18px;
    grid-template-columns:1fr;
  }
  @media(min-width:600px){ .grid{grid-template-columns:repeat(2, 1fr)} }
  .pcard{
    background:var(--papel);
    border:1px solid var(--linea);
    border-radius:14px;
    overflow:hidden; position:relative;
    display:flex; flex-direction:column;
    transition:all .25s;
  }
  .pcard::before{
    content:''; position:absolute; top:0; left:0; right:0; height:4px;
    background:var(--ciruela); transform:scaleX(0); transform-origin:left;
    transition:transform .3s ease; z-index:2;
  }
  .pcard:hover{
    border-color:var(--ciruela);
    box-shadow:0 8px 28px rgba(231,66,117,.12);
    transform:translateY(-3px);
  }
  .pcard:hover::before{transform:scaleX(1)}
  .pimg{
    width:100%; aspect-ratio:4/3;
    background:linear-gradient(135deg, #faf3f5 0%, var(--linea) 100%);
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .pimg .ph{
    font-family:'JetBrains Mono',monospace; font-size:.68rem;
    letter-spacing:.25em; text-transform:uppercase; font-weight:500;
    color:var(--gris);
  }
  .pimg img{width:100%; height:100%; object-fit:cover}
  .pimg-arrow{
    position:absolute; top:50%; transform:translateY(-50%);
    width:28px; height:28px; border-radius:50%; border:none;
    background:rgba(36,24,32,.45); color:#fff;
    font-size:1.1rem; line-height:1; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:background .15s;
  }
  .pimg-arrow:hover{background:rgba(36,24,32,.7)}
  .pimg-arrow.prev{left:8px}
  .pimg-arrow.next{right:8px}
  .pimg-dots{
    position:absolute; bottom:9px; left:50%; transform:translateX(-50%);
    display:flex; gap:5px;
  }
  .pimg-dot{
    width:6px; height:6px; border-radius:50%;
    background:rgba(255,255,255,.55); cursor:pointer;
    transition:background .15s, transform .15s;
  }
  .pimg-dot.active{background:#fff; transform:scale(1.25)}
  .badge-agotado{
    position:absolute; top:10px; left:10px;
    background:var(--tinta); color:#fff;
    font-family:'JetBrains Mono',monospace; font-size:.6rem;
    letter-spacing:.08em; text-transform:uppercase;
    padding:4px 9px; border-radius:100px;
  }
  .pbody{padding:18px; display:flex; flex-direction:column; flex:1}
  .pbadge{
    display:inline-block; align-self:flex-start;
    background:var(--ciruela-suave); color:var(--ciruela);
    font-size:.64rem; font-weight:600; letter-spacing:.15em;
    text-transform:uppercase; padding:4px 10px;
    border-radius:4px; margin-bottom:10px;
  }
  .pname{
    font-family:'Fraunces',serif; font-size:1.2rem; font-weight:700;
    line-height:1.2; margin-bottom:6px;
  }
  .pdesc{font-size:.8rem; color:var(--gris); line-height:1.5; margin-bottom:14px}
  .pincludes{
    margin-bottom:14px; padding:12px 14px;
    background:var(--marfil); border-radius:8px;
  }
  .pincludes-title{
    font-family:'JetBrains Mono',monospace; font-size:.62rem;
    letter-spacing:.22em; text-transform:uppercase;
    color:var(--ciruela); font-weight:500; margin-bottom:7px;
  }
  .pincludes-list{list-style:none; padding:0; margin:0}
  .pincludes-list li{
    font-size:.78rem; color:var(--tinta);
    padding:3px 0 3px 14px; position:relative; line-height:1.45;
  }
  .pincludes-list li::before{
    content:""; position:absolute; left:0; top:10px;
    width:5px; height:5px; background:var(--ciruela); border-radius:50%;
  }
  .pnote{
    font-size:.72rem; color:var(--gris); font-style:italic;
    margin-top:8px; padding-top:8px; border-top:1px dashed var(--linea);
    line-height:1.45;
  }
  .pmeta{
    display:flex; justify-content:space-between; align-items:flex-end;
    padding:12px 0 14px; border-top:1px solid var(--linea);
    margin-top:auto;
  }
  .pmeta-label{
    font-family:'JetBrains Mono',monospace; font-size:.6rem;
    letter-spacing:.18em; text-transform:uppercase;
    color:var(--gris); font-weight:500; display:block;
  }
  .pmeta-qty{display:flex; flex-direction:column; align-items:center}
  .pmeta-qty-value{
    font-family:'Fraunces',serif; font-size:1.15rem; font-weight:700; line-height:1.15;
  }
  .pmeta-price{display:flex; flex-direction:column; align-items:flex-end}
  .pmeta-price-value{
    font-family:'Fraunces',serif; font-size:1.4rem; font-weight:700;
    color:var(--ciruela); line-height:1.15;
  }
  .pmeta-price-extra{
    font-size:.64rem; color:var(--gris); letter-spacing:.04em; line-height:1.2;
  }
  .variant-row{display:flex; gap:8px}
  .variant-row .variant-select{flex:1; min-width:0}
  .variant-select{
    width:100%; padding:9px; margin-bottom:10px;
    border:1.5px solid var(--linea); border-radius:8px;
    font-family:'Inter',sans-serif; font-size:.8rem; background:#fff;
  }
  .pactions{display:flex; gap:8px}
  .qty-stepper{
    display:flex; align-items:center; flex:1;
    justify-content:space-between;
    border:1.5px solid var(--linea); border-radius:8px; overflow:hidden;
  }
  .qty-stepper.off{opacity:.4; pointer-events:none}
  .qty-btn{
    width:38px; height:42px; border:none; background:#fff;
    color:var(--tinta); font-size:18px; font-weight:600; line-height:1;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:background .15s, color .15s;
  }
  .qty-btn:hover{background:var(--ciruela-suave); color:var(--ciruela)}
  .qty-btn:active{background:var(--ciruela); color:#fff}
  .qty-value{
    width:30px; text-align:center; font-family:'JetBrains Mono',monospace;
    font-weight:600; font-size:.85rem; user-select:none;
  }

  .load-more-wrap{text-align:center; padding:20px 16px 40px}
  .results-info{
    font-family:'JetBrains Mono',monospace; font-size:.68rem;
    letter-spacing:.06em; color:var(--gris); margin-bottom:10px;
    text-transform:uppercase;
  }
  .load-more{
    border:1.5px solid var(--ciruela); color:var(--ciruela); background:var(--papel);
    padding:11px 28px; border-radius:100px;
    font-family:'Inter',sans-serif; font-size:.88rem; font-weight:600;
    cursor:pointer; transition:all .15s;
  }
  .load-more:hover{background:var(--ciruela); color:#fff}

  /* ============ VISTA LISTA DE PRECIOS ============ */
  .marca-group{margin-top:30px}
  .marca-title{
    font-family:'Fraunces',serif; font-weight:600; font-size:1.1rem;
    color:var(--ciruela);
    display:flex; align-items:baseline; gap:10px;
    padding-bottom:8px; border-bottom:2px solid var(--tinta);
    margin-bottom:12px;
  }
  .marca-title .n{
    font-family:'JetBrains Mono',monospace; font-size:.65rem;
    color:var(--gris); letter-spacing:.05em;
  }
  .cards{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:8px;
  }
  @media(min-width:600px){ .cards{grid-template-columns:repeat(3, 1fr); gap:10px} }
  .lcard{
    background:var(--papel);
    border:1px solid var(--linea);
    border-radius:var(--radio);
    padding:10px 12px;
    display:flex; flex-direction:column; gap:2px;
  }
  .lcard .cod{font-family:'JetBrains Mono',monospace; font-weight:600; font-size:.95rem}
  .lcard .cat{font-size:.66rem; color:var(--gris); text-transform:uppercase; letter-spacing:.06em}
  .lcard .precio{
    font-family:'JetBrains Mono',monospace; font-weight:600;
    font-size:1rem; color:var(--ciruela); margin-top:4px;
  }

  /* ============ VISTA CATÁLOGOS ============ */
  .catalogos-grid{display:grid; grid-template-columns:1fr; gap:10px; margin-top:20px}
  .catalogo-card{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px;
    background:var(--papel);
    border:1px solid var(--linea);
    border-radius:var(--radio);
    padding:16px 18px;
    text-decoration:none; color:var(--tinta);
    transition:border-color .15s, transform .15s;
  }
  .catalogo-card:hover, .catalogo-card:active{
    border-color:var(--ciruela);
    transform:translateY(-1px);
  }
  .catalogo-card .info{display:flex; flex-direction:column; gap:2px; min-width:0}
  .catalogo-card .nombre{font-family:'Fraunces',serif; font-weight:600; font-size:1rem}
  .catalogo-card .desc{font-size:.75rem; color:var(--gris)}
  .catalogo-card .flecha{flex-shrink:0; color:var(--ciruela); display:flex; align-items:center}

  /* ============ ESTADOS ============ */
  .estado{text-align:center; padding:70px 20px; color:var(--gris)}
  .estado .big{
    font-family:'Fraunces',serif; font-size:1.2rem; color:var(--tinta);
    margin-bottom:8px;
  }
  .spinner{
    width:28px;height:28px;margin:0 auto 16px;
    border:3px solid var(--linea); border-top-color:var(--ciruela);
    border-radius:50%; animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){.spinner{animation-duration:2s}}

  footer{
    text-align:center; padding:30px 16px 50px;
    font-size:.72rem; color:var(--gris);
    border-top:1px solid var(--linea);
  }
  footer .fmono{font-family:'JetBrains Mono',monospace; letter-spacing:.1em; text-transform:uppercase; font-size:.62rem}

  /* ============ CARRITO (drawer) ============ */
  .overlay{
    position:fixed; inset:0; background:rgba(36,24,32,.45);
    opacity:0; pointer-events:none; transition:opacity .2s; z-index:90;
  }
  .overlay.open{opacity:1; pointer-events:auto}
  .drawer{
    position:fixed; top:0; right:0; height:100vh; height:100dvh; width:min(420px, 100vw);
    background:var(--papel); z-index:100;
    transform:translateX(100%); transition:transform .25s ease;
    display:flex; flex-direction:column;
  }
  .drawer.open{transform:translateX(0)}
  .drawer-head{
    padding:16px; display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--linea);
  }
  .drawer-head h2{font-family:'Fraunces',serif; font-size:1.15rem}
  .close-btn{border:none; background:none; font-size:1.5rem; cursor:pointer; color:var(--gris); line-height:1}
  .drawer-items{flex:1; overflow-y:auto; padding:12px 16px; display:flex; flex-direction:column; gap:12px}
  .cart-item{display:flex; gap:10px; align-items:center}
  .cart-item-info{flex:1; min-width:0}
  .cart-item-name{font-size:.86rem; font-weight:600}
  .cart-item-variant{font-family:'JetBrains Mono',monospace; font-size:.72rem; color:var(--gris)}
  .cart-item-price{font-family:'JetBrains Mono',monospace; font-size:.78rem; color:var(--gris)}
  .qty{display:flex; align-items:center; gap:8px}
  .qty button{
    width:28px; height:28px; border-radius:8px; border:1px solid var(--linea);
    background:#fff; cursor:pointer; font-size:1rem; line-height:1; color:var(--tinta);
  }
  .qty span{min-width:22px; text-align:center; font-family:'JetBrains Mono',monospace; font-weight:600; font-size:.88rem}
  .cart-empty{text-align:center; color:var(--gris); padding:40px 10px; font-size:.9rem}
  .drawer-foot{border-top:1px solid var(--linea); padding:16px; display:flex; flex-direction:column; gap:10px}
  .total-row{display:flex; justify-content:space-between; font-weight:700; font-size:1.05rem}
  .total-row .monto{font-family:'JetBrains Mono',monospace; color:var(--ciruela)}
  .minimo-aviso{
    display:none; align-items:flex-start; gap:9px;
    background:var(--ciruela-suave); color:var(--tinta);
    border-left:4px solid var(--ciruela);
    font-size:.86rem; font-weight:600; line-height:1.4;
    padding:12px 14px; border-radius:8px;
  }
  .minimo-aviso .icon{font-size:1.05rem; line-height:1.3; flex-shrink:0}
  .minimo-aviso strong{color:var(--ciruela)}
  .checkout-btn{
    border:none; cursor:pointer;
    background:#25D366; color:#fff;
    padding:14px; border-radius:12px;
    font-family:'Inter',sans-serif; font-size:.95rem; font-weight:700;
    display:flex; align-items:center; justify-content:center; gap:8px;
    transition:filter .15s;
  }
  .checkout-btn:hover{filter:brightness(.96)}
  .checkout-btn:disabled{background:#d8ccd1; cursor:not-allowed}
  .back-link{background:none; border:none; color:var(--gris); font-size:.82rem; cursor:pointer; text-align:center; padding:4px}
  .form-group{display:flex; flex-direction:column; gap:4px}
  .form-row{display:flex; gap:10px}
  .form-row .form-group{flex:1; min-width:0}
  #envioGroup{display:flex; flex-direction:column; gap:12px}
  .form-group label{font-size:.78rem; font-weight:600}
  .form-group input, .form-group select, .form-group textarea{
    padding:10px; border:1px solid var(--linea); border-radius:8px;
    font-family:'Inter',sans-serif; font-size:.9rem; background:#fff;
    outline:none;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus{border-color:var(--ciruela)}
  .form-group textarea{resize:vertical; min-height:54px}
  .whatsapp-icon{width:19px; height:19px; fill:currentColor}

  /* ============ BARRA FLOTANTE DE PEDIDO ============ */
  .cart-bar{
    position:fixed; left:0; right:0; bottom:0; z-index:80;
    background:var(--tinta); color:#fff;
    padding:12px 16px;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    box-shadow:0 -4px 20px rgba(36,24,32,.25);
    transform:translateY(110%); transition:transform .3s ease;
  }
  .cart-bar.visible{transform:translateY(0)}
  .cart-bar-inner{
    max-width:760px; margin:0 auto; width:100%;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .cart-bar-info{display:flex; align-items:center; gap:9px; min-width:0}
  .cart-bar-badge{
    background:var(--ciruela); color:#fff; font-weight:700;
    font-family:'JetBrains Mono',monospace; font-size:.78rem;
    min-width:24px; height:24px; border-radius:50%;
    display:inline-flex; align-items:center; justify-content:center;
    padding:0 6px; flex-shrink:0;
  }
  .cart-bar-label{font-size:.74rem; color:rgba(255,255,255,.65); white-space:nowrap}
  .cart-bar-total{
    font-family:'Fraunces',serif; font-size:1.05rem; font-weight:700; white-space:nowrap;
  }
  .cart-bar-warn{
    font-size:.78rem; font-weight:700; color:var(--blush);
    line-height:1.3; flex:1; min-width:0;
  }
  .cart-bar-btn{
    display:inline-flex; align-items:center; gap:8px;
    background:#25D366; color:#fff; border:none; cursor:pointer;
    padding:11px 18px; border-radius:9px;
    font-family:'Inter',sans-serif; font-size:.85rem; font-weight:700;
    white-space:nowrap; transition:filter .2s;
    box-shadow:0 2px 10px rgba(37,211,102,.35);
  }
  .cart-bar-btn:hover{filter:brightness(.95)}
  .cart-bar-btn svg{width:16px; height:16px; fill:currentColor; flex-shrink:0}
  body.cart-active footer{padding-bottom:110px}
  @media(max-width:420px){

(function(){
"use strict";
const CART_KEY = "cart_keren_tienda";

const fmt = n => "$" + n.toLocaleString("es-AR", {maximumFractionDigits:0});

/* ---------- parser CSV (comillas, comas, saltos de línea) ---------- */
function parseCSV(text){
  const rows=[]; let row=[], field="", inQ=false;
  text = text.replace(/^﻿/,"");
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else inQ=false; }
      else field+=c;
    }
    else if(c==='"') inQ=true;
    else if(c===","){ row.push(field); field=""; }
    else if(c==="\n"||c==="\r"){
      if(c==="\r"&&text[i+1]==="\n") i++;
      row.push(field); field=""; rows.push(row); row=[];
    }
    else field+=c;
  }
  if(field!==""||row.length){ row.push(field); rows.push(row); }
  return rows.filter(r=>r.some(c=>c.trim()!==""));
}

const HEADER_MAP = {
  id:"id",
  name:"name", nombre:"name",
  price:"price", precio:"price",
  category:"category", categoria:"category", "categoría":"category", marca:"category",
  description:"description", descripcion:"description", "descripción":"description",
  details:"details", detalles:"details", detalle:"details", incluye:"details",
  badge:"badge", etiqueta:"badge",
  nota:"note", note:"note",
  prendas:"pieces", pieces:"pieces",
  image:"image", imagen:"image",
  available:"available", disponible:"available", stock:"available",
  variants:"variants", variantes:"variants", talles:"variants",
  colores:"colors", color:"colors", colors:"colors",
};

function parsePrice(raw){
  let v=String(raw).trim().replace(/[$\s]/g,"");
  if(!v) return NaN;
  if(v.includes(",")&&v.includes(".")){
    if(v.lastIndexOf(",")>v.lastIndexOf(".")) v=v.replace(/\./g,"").replace(",",".");
    else v=v.replace(/,/g,"");
  } else if(v.includes(",")){
    v=/,\d{1,2}$/.test(v)?v.replace(",","."):v.replace(/,/g,"");
  } else if(/^\d{1,3}(\.\d{3})+$/.test(v)){
    v=v.replace(/\./g,"");
  }
  return Number(v);
}

function parseAvailable(raw){
  const v=String(raw).trim().toLowerCase();
  if(v==="") return true;
  if(["true","sí","si","yes","1","x","disponible"].includes(v)) return true;
  if(["false","no","0","agotado"].includes(v)) return false;
  return true;
}

function rowsToProducts(rows){
  if(rows.length<2) return [];
  const headers=rows[0].map(h=>HEADER_MAP[h.trim().toLowerCase()]||null);
  if(!headers.includes("id")||!headers.includes("name")||!headers.includes("price")) return [];
  const out=[]; const seen=new Set();
  for(let i=1;i<rows.length;i++){
    const p={};
    headers.forEach((k,c)=>{ if(k) p[k]=(rows[i][c]||"").trim(); });
    const price=parsePrice(p.price);
    if(!p.id||seen.has(p.id)||!p.name||!isFinite(price)||price<0){
      console.warn("Tienda: fila "+(i+1)+" ignorada (datos incompletos o inválidos).");
      continue;
    }
    seen.add(p.id);
    const variants=(p.variants||"").split("|").map(v=>v.trim()).filter(Boolean);
    const colors=(p.colors||"").split("|").map(v=>v.trim()).filter(Boolean);
    // solo se aceptan valores que parezcan URL/archivo de imagen real;
    // texto suelto como "si"/"no"/"Falta" (notas internas de "¿tengo la foto?")
    // se ignora y el producto queda con el placeholder "Foto próximamente"
    const images=(p.image||"").split("|").map(v=>v.trim()).filter(Boolean)
      .filter(v=>/^https?:\/\//i.test(v)||/\.(jpe?g|png|gif|webp|avif)(\?.*)?$/i.test(v));
    // detalles: items separados por "|" o saltos de línea dentro de la celda
    const details=(p.details||"").split(/\||\n/).map(d=>d.trim()).filter(Boolean);
    out.push({
      id:p.id, name:p.name, price:price,
      category:p.category||"Otros",
      description:p.description||"",
      image:images[0]||null,
      images:images,
      available:parseAvailable(p.available||""),
      ...(variants.length?{variants}:{}),
      ...(colors.length?{colors}:{}),
      ...(details.length?{details}:{}),
      ...(p.badge?{badge:p.badge}:{}),
      ...(p.note?{note:p.note}:{}),
      ...(p.pieces?{pieces:p.pieces}:{})
    });
  }
  return out;
}

}

/* Sincroniza el carrito guardado con el catálogo actual:
   actualiza precios/nombres que cambiaron en el Sheet y elimina
   productos que ya no existen o quedaron sin stock. */
function reconciliarCarrito(){
  if(!cart.length) return;
  let cambio=false;
  cart=cart.filter(i=>{
    const p=PRODUCTS.find(x=>x.id===i.id);
    if(!p||!p.available){ cambio=true; return false; }
    if(i.price!==p.price||i.name!==p.name){
      i.price=p.price; i.name=p.name; cambio=true;
    }
    return true;
  });
  if(cambio){ saveCart(); renderCart(); }
}

      return;
    }
    bullets.push(x);
  });
  return {bullets, note, pieces, piecesLabel, priceExtra};
}

function renderTienda(){
  const f=filtros.tienda;
  const filtered=PRODUCTS.filter(p=>
    (f.chip==="Todos"||p.category===f.chip)&&
    (!f.search||(p.name+" "+p.category+" "+(p.description||"")).toLowerCase().includes(f.search))
  );
  countEl.textContent=filtered.length+" producto"+(filtered.length===1?"":"s");
  if(!filtered.length){
    loadMoreWrap.style.display="none";
    gridEl.innerHTML='<div class="estado" style="grid-column:1/-1"><div class="big">Sin resultados</div>Probá con otra búsqueda.</div>';
    return;
  }
  const list=filtered.slice(0,visibleCount);
  const hasMore=filtered.length>visibleCount;
  loadMoreWrap.style.display=hasMore?"":"none";
  if(hasMore) resultsInfo.textContent="Mostrando "+list.length+" de "+filtered.length;

  gridEl.innerHTML=list.map(p=>{
    const d=splitDetails(p);
    const imgs=getImages(p);
    return `
    <article class="pcard">
      <div class="pimg" data-id="${esc(p.id)}">
        ${imgs.length?`<img class="pimg-img" src="${esc(imgs[0])}" alt="${esc(p.name)}" loading="lazy">`:`<span class="ph">Foto próximamente</span>`}
        ${imgs.length>1?`
          <button type="button" class="pimg-arrow prev" aria-label="Foto anterior">‹</button>
          <button type="button" class="pimg-arrow next" aria-label="Foto siguiente">›</button>
          <div class="pimg-dots">${imgs.map((_,i)=>`<span class="pimg-dot${i===0?" active":""}"></span>`).join("")}</div>
        `:""}
        ${!p.available?`<span class="badge-agotado">Agotado</span>`:""}
      </div>
      <div class="pbody">
        <span class="pbadge">${esc(p.badge||p.category)}</span>
        <h3 class="pname">${esc(p.name)}</h3>
        ${p.description?`<p class="pdesc">${esc(p.description)}</p>`:""}
        ${d.bullets.length||d.note?`<div class="pincludes">
          ${d.bullets.length?`<div class="pincludes-title">Incluye</div>
          <ul class="pincludes-list">${d.bullets.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`:""}
          ${d.note?`<p class="pnote">${esc(d.note)}</p>`:""}
        </div>`:""}
        <div class="pmeta">
          ${d.pieces?`<div class="pmeta-qty"><span class="pmeta-label">${esc(d.piecesLabel)}</span><span class="pmeta-qty-value">${esc(d.pieces)}</span></div>`:`<div></div>`}
          <div class="pmeta-price">
            <span class="pmeta-label">Precio</span>
            <span class="pmeta-price-value">${fmt(p.price)}</span>
            ${d.priceExtra?`<span class="pmeta-price-extra">${esc(d.priceExtra)}</span>`:""}
          </div>
        </div>
        ${p.variants||p.colors?`<div class="variant-row">
          ${p.variants?`<select class="variant-select" id="var-${esc(p.id)}" aria-label="Talle">
            ${p.variants.map(v=>`<option>${esc(v)}</option>`).join("")}
          </select>`:""}
          ${p.colors?`<select class="variant-select" id="col-${esc(p.id)}" aria-label="Color">
            ${p.colors.map(v=>`<option>${esc(v)}</option>`).join("")}
          </select>`:""}
        </div>`:""}
        <div class="pactions">
          <div class="qty-stepper${p.available?"":" off"}" data-id="${esc(p.id)}">
            <button type="button" class="qty-btn qminus" aria-label="Restar ${esc(p.name)}">−</button>
            <span class="qty-value">0</span>
            <button type="button" class="qty-btn qplus" aria-label="Sumar ${esc(p.name)}">+</button>
          </div>
        </div>
      </div>
    </article>`;
  }).join("");

  gridEl.querySelectorAll(".pimg").forEach(box=>{
    const p=PRODUCTS.find(x=>x.id===box.dataset.id);
    const imgs=getImages(p);
    if(imgs.length<2) return;
    let idx=0;
    const imgEl=box.querySelector(".pimg-img");
    const dots=box.querySelectorAll(".pimg-dot");
    const show=i=>{
      idx=(i+imgs.length)%imgs.length;
      imgEl.src=imgs[idx];
      dots.forEach((dot,j)=>dot.classList.toggle("active",j===idx));
    };
    box.querySelector(".prev").onclick=e=>{ e.stopPropagation(); show(idx-1); };
    box.querySelector(".next").onclick=e=>{ e.stopPropagation(); show(idx+1); };
    dots.forEach((dot,j)=>dot.onclick=e=>{ e.stopPropagation(); show(j); });
    // swipe táctil (celular)
    let touchX=null;
    box.addEventListener("touchstart",e=>{ touchX=e.touches[0].clientX; },{passive:true});
    box.addEventListener("touchend",e=>{
      if(touchX===null) return;
      const delta=e.changedTouches[0].clientX-touchX;
      if(Math.abs(delta)>40) show(idx+(delta<0?1:-1));
      touchX=null;
    },{passive:true});
  });

  gridEl.querySelectorAll(".qty-stepper:not(.off)").forEach(st=>{
    const p=PRODUCTS.find(x=>x.id===st.dataset.id);
    const sel=document.getElementById("var-"+p.id);
    const selC=document.getElementById("col-"+p.id);
    const valEl=st.querySelector(".qty-value");
    const varLabel=()=>{
      const parts=[];
      if(sel) parts.push(sel.value);
      if(selC) parts.push(selC.value);
      return parts.length?parts.join(" / "):null;
    };
    const keyOf=()=>{const v=varLabel(); return p.id+(v?"|"+v:"");};
    const refresh=()=>{const it=cart.find(i=>i.key===keyOf()); valEl.textContent=it?it.qty:0;};
    if(sel) sel.addEventListener("change",refresh);
    if(selC) selC.addEventListener("change",refresh);
    st.querySelector(".qplus").onclick=()=>{ addToCart(p, varLabel()); refresh(); };
    st.querySelector(".qminus").onclick=()=>{ changeQty(keyOf(),-1); refresh(); };
    refresh();
  });
}

document.getElementById("loadMore").onclick=()=>{
  visibleCount+=PAGE_SIZE;
  renderVista();
};

/* ---------- LISTA DE PRECIOS ---------- */
function renderLista(){
  const cont=document.getElementById("lista-content");
  if(!LISTA){ countEl.textContent=""; return; }
  const f=filtros.lista;
  const filtrado=LISTA.filter(d=>
    (f.chip==="Todos"||d.marca===f.chip)&&
    (!f.search||(d.articulo+" "+d.marca+" "+d.categoria).toLowerCase().includes(f.search))
  );
  countEl.textContent=filtrado.length+" artículo"+(filtrado.length===1?"":"s");
  if(!filtrado.length){
    cont.innerHTML='<div class="estado"><div class="big">Sin resultados</div>Probá con otra búsqueda.</div>';
    return;
  }
  const marcas=[...new Set(filtrado.map(d=>d.marca))];
  cont.innerHTML=marcas.map(m=>{
    const items=filtrado.filter(d=>d.marca===m);
    return `
    <div class="marca-group">
      <div class="marca-title">${esc(m)} <span class="n">${items.length} art.</span></div>
      <div class="cards">
        ${items.map(d=>`
          <div class="lcard">
            <div class="cod">${esc(d.articulo)}</div>
            ${d.categoria?`<div class="cat">${esc(d.categoria)}</div>`:""}
            <div class="precio">${fmt(d.precio)}</div>
          </div>`).join("")}
      </div>
    </div>`;
  }).join("");
}

/* ---------- CATÁLOGOS ---------- */

      </span>
    </a>`).join("");

/* ==================================================================
   PESTAÑAS
   ================================================================== */
function mostrarTab(vista){
  vistaActiva=vista;
  ["tienda","lista","catalogos"].forEach(v=>{
    document.getElementById("tab-"+v).classList.toggle("active", v===vista);
    document.getElementById("view-"+v).style.display=v===vista?"":"none";
  });
  const conControles=vista!=="catalogos";
  document.getElementById("controls").style.display=conControles?"":"none";
  loadMoreWrap.style.display="none";
  if(conControles){
    searchInput.value=filtros[vista].search;
    searchInput.placeholder=vista==="tienda"?"Buscar producto…":"Buscar por artículo o marca…";
  }
  visibleCount=PAGE_SIZE;
  if(vista==="lista"&&!LISTA){ renderChips(); cargarLista(); countEl.textContent=""; return; }
  renderChips();
  renderVista();
}
document.getElementById("tab-tienda").onclick=()=>mostrarTab("tienda");
document.getElementById("tab-lista").onclick=()=>mostrarTab("lista");
document.getElementById("tab-catalogos").onclick=()=>mostrarTab("catalogos");

/* ==================================================================
   CARRITO
   ================================================================== */
function addToCart(p,variant){
  const key=p.id+(variant?"|"+variant:"");
  const found=cart.find(i=>i.key===key);
  if(found) found.qty++;
  else cart.push({key,id:p.id,name:p.name,variant,price:p.price,qty:1});
  saveCart(); renderCart();
}
function changeQty(key,delta){
  const item=cart.find(i=>i.key===key);
  if(!item) return;
  item.qty+=delta;
  if(item.qty<=0) cart=cart.filter(i=>i.key!==key);
  saveCart(); renderCart();
}
const cartItemsEl=document.getElementById("cartItems");
const cartCountEl=document.getElementById("cartCount");
const cartTotalEl=document.getElementById("cartTotal");
const checkoutBtn=document.getElementById("checkoutBtn");
const minimoAviso=document.getElementById("minimoAviso");
const cartTotal=()=>cart.reduce((s,i)=>s+i.price*i.qty,0);

function renderCart(){
  const totalQty=cart.reduce((s,i)=>s+i.qty,0);
  cartCountEl.textContent=totalQty;
  const total=cartTotal();
  cartTotalEl.textContent=fmt(total);

  // barra flotante
  document.getElementById("cartBarCount").textContent=totalQty;
  document.getElementById("cartBarTotal").textContent=fmt(total);
  document.getElementById("cartBar").classList.toggle("visible", cart.length>0);
  document.body.classList.toggle("cart-active", cart.length>0);
  const bajoMinimo=PEDIDO_MINIMO>0&&total<PEDIDO_MINIMO&&cart.length>0;
  checkoutBtn.disabled=cart.length===0||bajoMinimo;
  minimoAviso.style.display=bajoMinimo?"flex":"none";
  if(bajoMinimo){
    document.getElementById("minimoAvisoTexto").innerHTML=
      "Compra mínima <strong>"+fmt(PEDIDO_MINIMO)+"</strong>. Te faltan "+fmt(PEDIDO_MINIMO-total)+" para poder finalizar el pedido.";
  }
  // aviso también en la barra flotante, visible antes de abrir el carrito
  const barWarn=document.getElementById("cartBarWarn");
  const barInfo=document.getElementById("cartBarInfo");
  barWarn.style.display=bajoMinimo?"":"none";
  barInfo.style.display=bajoMinimo?"none":"flex";
  if(bajoMinimo) barWarn.textContent="Compra mínima "+fmt(PEDIDO_MINIMO)+" · Te faltan "+fmt(PEDIDO_MINIMO-total);

  if(!cart.length){
    cartItemsEl.innerHTML='<div class="cart-empty">Tu pedido está vacío.<br>Agregá productos desde la Tienda.</div>';
    return;
  }
  cartItemsEl.innerHTML=cart.map(i=>`
    <div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${esc(i.name)}</div>
        ${i.variant?`<div class="cart-item-variant">Talle/var: ${esc(i.variant)}</div>`:""}
        <div class="cart-item-price">${fmt(i.price)} c/u</div>
      </div>
      <div class="qty">
        <button data-key="${esc(i.key)}" data-d="-1" aria-label="Quitar uno">−</button>
        <span>${i.qty}</span>
        <button data-key="${esc(i.key)}" data-d="1" aria-label="Agregar uno">+</button>
      </div>
    </div>
  `).join("");
  cartItemsEl.querySelectorAll(".qty button").forEach(b=>{
    b.onclick=()=>changeQty(b.dataset.key,+b.dataset.d);
  });
}

/* ---------- drawer ---------- */
const drawer=document.getElementById("drawer");
const overlay=document.getElementById("overlay");
const openDrawer=()=>{drawer.classList.add("open");overlay.classList.add("open");};
const closeDrawer=()=>{
  drawer.classList.remove("open");overlay.classList.remove("open");showCartView();
  if(vistaActiva==="tienda") renderVista(); // sincronizar steppers con el carrito
};
document.getElementById("openCart").onclick=openDrawer;
document.getElementById("cartBarBtn").onclick=openDrawer;
document.getElementById("closeCart").onclick=closeDrawer;
overlay.onclick=closeDrawer;
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"&&drawer.classList.contains("open")) closeDrawer();
});

/* ---------- vistas del drawer ---------- */
const formEl=document.getElementById("checkoutForm");
const backBtn=document.getElementById("backBtn");
const btnText=document.getElementById("checkoutBtnText");
const drawerTitle=document.getElementById("drawerTitle");
function showCartView(){
  inCheckout=false;
  cartItemsEl.style.display="";
  formEl.style.display="none";
  backBtn.style.display="none";
  btnText.textContent="Continuar";
  drawerTitle.textContent="Tu pedido";
}
function showFormView(){
  inCheckout=true;
  cartItemsEl.style.display="none";
  formEl.style.display="";
  backBtn.style.display="";
  btnText.textContent="Enviar pedido por WhatsApp";
  drawerTitle.textContent="Tus datos";
}
backBtn.onclick=showCartView;

const deliverySelect=document.getElementById("fDelivery");
deliverySelect.onchange=()=>{
  const retiro=/retiro/i.test(deliverySelect.value);
  document.getElementById("envioGroup").style.display=retiro?"none":"";
};

/* ---------- checkout → WhatsApp ---------- */
checkoutBtn.onclick=()=>{
  if(!cart.length) return;
  if(!inCheckout){ showFormView(); return; }
  const val=id=>document.getElementById(id).value.trim();
  const name=val("fName");
  if(!name){ document.getElementById("fName").focus(); return; }
  const delivery=deliverySelect.value;
  const esEnvio=!/retiro/i.test(delivery);
  const address=val("fAddress"), cp=val("fCP"), ciudad=val("fCiudad"), provincia=val("fProvincia");
  if(esEnvio){
    // con envío, todos los datos de dirección son obligatorios
    for(const [campo,valor] of [["fAddress",address],["fCP",cp],["fCiudad",ciudad],["fProvincia",provincia]]){
      if(!valor){ document.getElementById(campo).focus(); return; }
    }
  }
  const notes=val("fNotes");

  let msg="¡Hola Lencería Keren! Quiero hacer un pedido mayorista:\n\n";
  cart.forEach(i=>{
    msg+="▪ "+i.qty+"x "+i.name+(i.variant?" ("+i.variant+")":"")+" — "+fmt(i.price*i.qty)+"\n";
  });
  msg+="\n*Total: "+fmt(cartTotal())+"*\n\n";
  msg+="Nombre: "+name+"\n";
  msg+="Entrega: "+delivery+"\n";
  if(esEnvio){
    msg+="Dirección: "+address+"\n";
    msg+="Código postal: "+cp+"\n";
    msg+="Ciudad: "+ciudad+"\n";
    msg+="Provincia: "+provincia+"\n";
  }
  if(notes) msg+="Notas: "+notes+"\n";

  window.open("https://wa.me/"+WHATSAPP+"?text="+encodeURIComponent(msg),"_blank");
};

/* ==================================================================
   HEADER COMPACTO AL SCROLLEAR
   (mismo mecanismo que la lista de precios original: header fijo,
   el body compensa con padding para que el colapso no mueva el
   contenido ni retroalimente el scroll)
   ================================================================== */
const headerEl=document.querySelector("header");
function ajustarPaddingHeader(){
  if(!headerEl.classList.contains("compact")){
    document.body.style.paddingTop=headerEl.offsetHeight+"px";
  }
}
if(typeof ResizeObserver!=="undefined"){
  new ResizeObserver(ajustarPaddingHeader).observe(headerEl);
} else {
  window.addEventListener("resize",ajustarPaddingHeader);
}
ajustarPaddingHeader();

let lastY=window.scrollY;
window.addEventListener("scroll",()=>{
  const y=window.scrollY;
  const delta=y-lastY;
  if(y<80){
    headerEl.classList.remove("compact");        // cerca del tope: expandido
  } else if(delta>6){
    headerEl.classList.add("compact");           // bajando: colapsar
  } else if(delta<-6){
    headerEl.classList.remove("compact");        // subiendo: expandir
  }
  lastY=y;
},{passive:true});

/* ==================================================================
   INIT
   ================================================================== */
renderCart();
cargarTienda();
if(location.hash==="#lista") mostrarTab("lista");
else if(location.hash==="#catalogos") mostrarTab("catalogos");
})();
</script>
